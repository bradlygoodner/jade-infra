services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    pull_policy: never
    container_name: propertyops-postgres
    restart: unless-stopped
    mem_limit: 1g
    env_file: .env
    shm_size: 256m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - max_connections=40
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.0
      - -c
      - default_statistics_target=200
      - -c
      - log_min_duration_statement=1000
      - -c
      - max_locks_per_transaction=128
      - -c
      - statement_timeout=120000
    volumes:
      - ${DOCKER_DATA_PATH}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      internal:
        ipv4_address: 172.30.0.2

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    pull_policy: never
    container_name: propertyops-redis
    restart: unless-stopped
    mem_limit: 400m
    env_file: .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "300mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - ${DOCKER_DATA_PATH}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      internal:
        ipv4_address: 172.30.0.3

  # ── Baserow ───────────────────────────────────────────────────────────────────
  baserow:
    image: baserow/baserow:latest
    pull_policy: never
    container_name: propertyops-baserow
    restart: unless-stopped
    mem_limit: 6g
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Renamed/computed — not redundant with env_file
      DATABASE_HOST: 172.30.0.2
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: 172.30.0.3
    volumes:
      - ${DOCKER_DATA_PATH}/baserow:/baserow/data
    ports:
      - "${BASEROW_PORT:-8086}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/api/_health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      internal:
        ipv4_address: 172.30.0.4
      jade_shared:

networks:
  internal:
    # Private — postgres and redis not reachable from other stacks
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  jade_shared:
    # Shared with n8n and future jade-properties services
    name: jade_shared
    driver: bridge
