services:

  # -- Docuseal ----------------------------------------------------------------
  docuseal:
    image: docuseal/docuseal:latest
    container_name: propertyops-docuseal
    restart: unless-stopped
    mem_limit: 1g
    env_file: .env
    volumes:
      - ${DOCKER_DATA_PATH}/docuseal:/data
    ports:
      - "${DOCUSEAL_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - jade_shared

networks:
  jade_shared:
    external: true
    name: jade_shared
